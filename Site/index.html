<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plus Mídia - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="./logoplus - Copia.svg" alt="Plus Mídia" class="logo-img">
    </div>
    <nav class="sidebar-nav">

      <p class="nav-section-label">VISÃO GERAL</p>
      <a href="#" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="7" height="7" rx="1"/><rect x="11" y="2" width="7" height="7" rx="1"/><rect x="2" y="11" width="7" height="7" rx="1"/><rect x="11" y="11" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>

      <p class="nav-section-label">AVALIAÇÕES</p>
      <a href="#" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Respostas</span>
      </a>
      <a href="#" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="18" y2="6"/><line x1="8" y1="10" x2="18" y2="10"/><line x1="8" y1="14" x2="14" y2="14"/><circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="10" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="14" r="1.2" fill="currentColor" stroke="none"/></svg>
        <span>Comentários</span>
      </a>

      <p class="nav-section-label">ANÁLISE</p>
      <a href="#" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16l4-2 4 2 4-2V4a2 2 0 0 0-2-2z"/></svg>
        <span>Relatórios</span>
      </a>
      <a href="#" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 19 9 5 6 12 2 12"/></svg>
        <span>Métricas</span>
      </a>

      <p class="nav-section-label">CADASTROS</p>
      <a href="#" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"/><circle cx="10" cy="7" r="4"/></svg>
        <span>Clientes</span>
      </a>
      <a href="#" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Estabelecimentos</span>
      </a>
      <a href="#" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Usuários</span>
      </a>

    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="topbar-menu" aria-label="Menu">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="17" y2="6"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="14" x2="17" y2="14"/></svg>
      </button>
      <div class="topbar-right">
        <button class="topbar-icon" aria-label="Notificações">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 8A5 5 0 0 0 5 8c0 4.5-2 5.5-2 5.5h14s-2-1-2-5.5"/><path d="M11.73 17a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <div class="topbar-avatar">U</div>
      </div>
    </header>
    <div class="content">
      <!-- conteúdo -->
    </div>
  </main>

</body>
</html>
